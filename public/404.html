<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Olea</title>
    <script>
      // GitHub Pages SPA fallback: preserve the requested path then load index.html
      (function () {
        var path = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem("redirect", path);
        window.location.replace("/");
      })();
    </script>
  </head>
  <body></body>
</html>
